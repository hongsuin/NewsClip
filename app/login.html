<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — DailyClip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-wrapper">
    <!-- 로고 -->
    <a href="../landing/index.html" class="auth-logo">DailyClip</a>
    <p class="auth-tagline">오늘의 뉴스가 내일의 면접 답변이 된다</p>

    <!-- 탭 -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login">로그인</button>
      <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" aria-controls="panel-register">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div class="auth-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
      <form id="form-login" novalidate>
        <div class="field">
          <label for="login-email">이메일</label>
          <input type="email" id="login-email" placeholder="example@email.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="login-password">비밀번호</label>
          <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password" required />
        </div>
        <p class="form-error" id="login-error" aria-live="polite"></p>
        <button type="submit" class="btn-primary btn-full" id="btn-login">로그인</button>
      </form>
    </div>

    <!-- 회원가입 폼 -->
    <div class="auth-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
      <form id="form-register" novalidate>
        <div class="field">
          <label for="reg-email">이메일</label>
          <input type="email" id="reg-email" placeholder="example@email.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="reg-password">비밀번호</label>
          <input type="password" id="reg-password" placeholder="6자 이상 입력" autocomplete="new-password" required />
        </div>
        <p class="form-error" id="register-error" aria-live="polite"></p>
        <button type="submit" class="btn-primary btn-full" id="btn-register">회원가입</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
